name: PTD Watcher — Loop de Iteração Autônomo

# Roda a cada 5 minutos e detecta runs de debug concluídos.
# Quando encontra órgãos com 0 extrações, avança a state machine
# de parâmetros OCR/Docling, commita fixes e dispara o próximo run.
# Requer secret WORKFLOW_PAT com permissões Contents+Actions no repo.

on:
  # schedule:                   # ← PAUSADO (2026-04-07): revisão ViableOS em andamento
  #   - cron: '*/5 * * * *'     # reativar só após: (1) s3_meta_parameters.json corrigido,
  #                              #   (2) pipeline full run com ≥50 órgãos confirmado,
  #                              #   (3) Vollzug Protocol implementado
  workflow_dispatch:         # execução manual para testar

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout pipeline-outputs
        uses: actions/checkout@v4
        with:
          ref: pipeline-outputs
          fetch-depth: 1
        continue-on-error: true   # branch pode não existir ainda

      - name: "[Step A] Salvar learning signals e summary do pipeline-outputs"
        run: |
          # Preserva dados do pipeline-outputs em /tmp antes de trocar de branch
          cp ptd_run_summary.json    /tmp/ptd_run_summary_po.json    2>/dev/null || echo '{}' > /tmp/ptd_run_summary_po.json
          cp ptd_learning_signals.json /tmp/ptd_learning_signals.json 2>/dev/null || echo '{"schema_version":1,"run_history":[],"meta_insights":[],"current_strategy":{"focus":"vocabulario","auto_add_threshold":8,"review_threshold":3,"priority_siglas":[]}}' > /tmp/ptd_learning_signals.json
          echo "[Step A] learning signals: $(jq '.run_history | length' /tmp/ptd_learning_signals.json) entradas"

          # Buscar metaparâmetros e política S5 por órgão da branch de trabalho
          git fetch origin claude/setup-docling-pipeline-g11gg --depth=1 2>/dev/null || true
          git show origin/claude/setup-docling-pipeline-g11gg:config/s3_meta_parameters.json \
            > /tmp/s3_meta_parameters.json 2>/dev/null \
            || echo '{"parada_automatica":{"ativo":false}}' > /tmp/s3_meta_parameters.json
          echo "[Step A] parada_automatica.ativo: $(jq -r '.parada_automatica.ativo // false' /tmp/s3_meta_parameters.json)"

          # org_meta.json — S5 por órgão (Nível -1 VSM)
          git show origin/claude/setup-docling-pipeline-g11gg:config/org_meta.json \
            > /tmp/org_meta.json 2>/dev/null \
            || echo '{"_default":{"status":"ativo"}}' > /tmp/org_meta.json
          N_EXCLUIDOS=$(jq '[to_entries[] | select(.key | startswith("_") | not) | select(.value.status=="excluir")] | length' /tmp/org_meta.json 2>/dev/null || echo 0)
          echo "[Step A] org_meta: $N_EXCLUIDOS órgão(s) com status=excluir (não bloqueiam Stage 0)"

      - name: Verificar se há run novo com falhas
        id: check
        run: |
          if [ ! -f last_run.json ] || [ ! -f ptd_run_summary.json ]; then
            echo "status=waiting" >> $GITHUB_OUTPUT
            echo "Aguardando primeiro run de debug..."
            exit 0
          fi

          RUN_ID=$(jq -r '.run_id' last_run.json)
          LAST=$(cat .last_processed 2>/dev/null || echo "")

          if [ "$RUN_ID" = "$LAST" ]; then
            echo "status=already_processed" >> $GITHUB_OUTPUT
            echo "Run $RUN_ID já processado."
            exit 0
          fi

          # Usar orgaos_zero_ou_noise: inclui orgs com rows mas 0% pct_ok (MD, MEC)
          N_ZERO=$(jq '(.orgaos_zero_ou_noise // .orgaos_zero_entregas) | length' ptd_run_summary.json)
          STAGE=$(jq -r '.stage // 0' ptd_run_summary.json)
          STAGE_LABEL=$(jq -r '.stage_label // "cobertura"' ptd_run_summary.json)
          PCT_OK=$(jq -r '.pct_ok // 0' ptd_run_summary.json)
          SEM_PROD_PCT=$(jq -r '.sem_produto_pct // 0' ptd_run_summary.json)
          echo "run_id=$RUN_ID"             >> $GITHUB_OUTPUT
          echo "n_zero=$N_ZERO"             >> $GITHUB_OUTPUT
          echo "stage=$STAGE"               >> $GITHUB_OUTPUT
          echo "stage_label=$STAGE_LABEL"   >> $GITHUB_OUTPUT
          echo "pct_ok=$PCT_OK"             >> $GITHUB_OUTPUT
          echo "sem_prod_pct=$SEM_PROD_PCT" >> $GITHUB_OUTPUT

          # Cobertura de riscos (segundo componente do propósito: entregas + riscos)
          COB_RISCOS=$(jq -r '.risco_coverage.cobertura_riscos_pct // "null"' ptd_run_summary.json)
          N_RISCOS=$(jq -r '.risco_coverage.n_riscos_total // 0' ptd_run_summary.json)
          echo "cobertura_riscos_pct=$COB_RISCOS" >> $GITHUB_OUTPUT
          echo "n_riscos=$N_RISCOS"               >> $GITHUB_OUTPUT

          # Classificar tipo de problema dominante ANTES de decidir tratamento
          # Triple Index: usar gap_type se disponível para distinguir col_keys vs. vocab
          N_COL_KEYS=$(jq '[.por_orgao // [] | .[] | select(.triple_gap_type == "col_keys")] | length' ptd_run_summary.json 2>/dev/null || echo 0)
          if [ "$N_ZERO" -gt 0 ]; then
            PROBLEM_TYPE="cobertura"      # Stage 0: sem extração → OCR/Docling params
          elif [ "$N_COL_KEYS" -gt 0 ] && python3 -c "import sys; sys.exit(0 if float('$SEM_PROD_PCT') > 20 else 1)" 2>/dev/null; then
            PROBLEM_TYPE="col_keys"       # Triple Index: órgãos com cap. baixa → col_keys fix
          elif python3 -c "import sys; sys.exit(0 if float('$SEM_PROD_PCT') > 20 else 1)" 2>/dev/null; then
            PROBLEM_TYPE="vocabulario"    # Stage 1: sem_produto alto → expandir vocab
          elif [ "$COB_RISCOS" != "null" ] && python3 -c "import sys; sys.exit(0 if float('$COB_RISCOS') < 80 else 1)" 2>/dev/null; then
            PROBLEM_TYPE="riscos"         # Stage 3: entregas OK mas cobertura de riscos baixa
          else
            PROBLEM_TYPE="qualidade"      # Stage 1b/2+: pct_ok baixo → revisar pipeline
          fi
          echo "problem_type=$PROBLEM_TYPE" >> $GITHUB_OUTPUT

          if [ "$STAGE" = "3" ] && [ "$N_ZERO" = "0" ] && \
             python3 -c "import sys; sys.exit(0 if float('$PCT_OK') >= 90 else 1)" 2>/dev/null; then
            echo "status=done" >> $GITHUB_OUTPUT
            echo "✅ Pipeline convergiu — todos os estágios completos!"
          elif [ "$STAGE" != "0" ] && [ "$N_ZERO" = "0" ] && \
               python3 -c "import sys; sys.exit(0 if float('$PCT_OK') >= 80 else 1)" 2>/dev/null; then
            echo "status=needs_human_review" >> $GITHUB_OUTPUT
            echo "⚠ Estágio $STAGE ($STAGE_LABEL) requer revisão humana antes de continuar."
          else
            # ── Verificar critérios de parada automática (S5) ────────────────
            PARADA_ATIVO=$(jq -r '.parada_automatica.ativo // false' /tmp/s3_meta_parameters.json 2>/dev/null || echo 'false')
            PARADA_MOTIVO=""

            if [ "$PARADA_ATIVO" = "true" ]; then
              DEADLINE=$(jq -r '.parada_automatica.deadline_iso // ""' /tmp/s3_meta_parameters.json 2>/dev/null || echo "")
              MIN_SLOPE=$(jq -r '.parada_automatica.min_slope_para_continuar // 0.05' /tmp/s3_meta_parameters.json 2>/dev/null || echo "0.05")
              SLOPE_WIN=$(jq -r '.parada_automatica.slope_window // 20' /tmp/s3_meta_parameters.json 2>/dev/null || echo "20")

              # Critério 1: prazo de 48h
              if [ -n "$DEADLINE" ]; then
                NOW_EPOCH=$(date -u +%s)
                DEAD_EPOCH=$(date -u -d "$DEADLINE" +%s 2>/dev/null || python3 -c "from datetime import datetime,timezone; print(int(datetime.fromisoformat('$DEADLINE'.replace('Z','+00:00')).timestamp()))" 2>/dev/null || echo "9999999999")
                if [ "$NOW_EPOCH" -ge "$DEAD_EPOCH" ]; then
                  PARADA_MOTIVO="PRAZO: deadline $DEADLINE atingido após 48h"
                fi
              fi

              # Critério 2: slope < min_slope (aprendizado estagnado)
              if [ -z "$PARADA_MOTIVO" ]; then
                SLOPE=$(python3 - <<PYEOF
import json, sys
from pathlib import Path
signals = json.loads(Path('/tmp/ptd_learning_signals.json').read_text()) if Path('/tmp/ptd_learning_signals.json').exists() else {}
history = signals.get('run_history', [])
window = int('$SLOPE_WIN')
recent = [e['pct_ok'] for e in history[-window:] if e.get('pct_ok') is not None]
if len(recent) < 5:
    print('0.99')  # dados insuficientes — não pausar
    sys.exit(0)
n = len(recent); xs = list(range(n)); xm = sum(xs)/n; ym = sum(recent)/n
num = sum((x-xm)*(y-ym) for x,y in zip(xs,recent))
den = sum((x-xm)**2 for x in xs)
print(round(num/den, 4) if den else 0.0)
PYEOF
                )
                if python3 -c "import sys; sys.exit(0 if float('$SLOPE') < float('$MIN_SLOPE') else 1)" 2>/dev/null; then
                  PARADA_MOTIVO="ESTAGNAÇÃO: slope=$SLOPE pp/iter < $MIN_SLOPE (aprendizado não vale a pena)"
                fi
              fi

              # Critério 3: meta S5 atingida
              if [ -z "$PARADA_MOTIVO" ]; then
                PCT_META=$(jq -r '.parada_automatica.pct_ok_sucesso // 90' /tmp/s3_meta_parameters.json 2>/dev/null || echo "90")
                if python3 -c "import sys; sys.exit(0 if float('$PCT_OK') >= float('$PCT_META') else 1)" 2>/dev/null; then
                  PARADA_MOTIVO="SUCESSO: pct_ok=$PCT_OK% ≥ meta=$PCT_META%"
                fi
              fi
            fi

            if [ -n "$PARADA_MOTIVO" ]; then
              echo "status=paused_auto"  >> $GITHUB_OUTPUT
              echo "parada_motivo=$PARADA_MOTIVO" >> $GITHUB_OUTPUT
              echo "🛑 PARADA AUTOMÁTICA S5: $PARADA_MOTIVO"
            else
              echo "status=needs_fix" >> $GITHUB_OUTPUT
              echo "⚠ Estágio $STAGE ($STAGE_LABEL) — $N_ZERO zerados, pct_ok=$PCT_OK%, problema=$PROBLEM_TYPE — aplicando fix..."
            fi
          fi

      - name: "[Step S5] Parada automática — registrar e notificar"
        if: steps.check.outputs.status == 'paused_auto'
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
          MOTIVO:       ${{ steps.check.outputs.parada_motivo }}
          PCT_OK:       ${{ steps.check.outputs.pct_ok }}
          ITERATION:    ${{ steps.check.outputs.run_id }}
        run: |
          git config user.name  "ptd-watcher[bot]"
          git config user.email "ptd-watcher[bot]@users.noreply.github.com"
          git fetch origin claude/setup-docling-pipeline-g11gg --depth=1
          git checkout origin/claude/setup-docling-pipeline-g11gg -b work-paused

          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ITER=$(grep 'iteration:' .trigger_debug 2>/dev/null | awk '{print $2}' || echo '?')

          python3 - <<PYEOF
import json
from datetime import datetime
from pathlib import Path

# Gerar PAUSA_AUTO.md
motivo = "$MOTIVO"
pct_ok = "$PCT_OK"
iteration = "$ITER"
ts = "$TS"

doc = f"""# 🛑 Pausa Automática — PTD-BR Pipeline

**Timestamp**: {ts}
**Iteração**: {iteration}
**pct_ok no momento da parada**: {pct_ok}%

## Motivo da parada

{motivo}

## O que fazer agora

1. Avaliar se a meta S5 (pct_ok ≥ 90%) está próxima — se sim, ajustar parâmetros e reativar
2. Para **reativar**: editar `config/s3_meta_parameters.json`, campo `parada_automatica`:
   - Mudar `"ativo": true` para `"ativo": false`, ou
   - Atualizar `"deadline_iso"` para nova data, ou
   - Ajustar `"min_slope_para_continuar"` para valor menor
3. Para **encerrar definitivamente**: verificar se corpus é suficiente para os objetivos de análise

## Métricas no momento da parada

Ver `ptd_run_summary.json` no branch `pipeline-outputs`.

---
*Gerado automaticamente pelo watcher (Step S5) — VSM S5 Política*
"""
Path('PAUSA_AUTO.md').write_text(doc, encoding='utf-8')
print(doc[:400])

# Atualizar stage_status.json
status = {
    "stage": "paused_auto",
    "motivo": motivo,
    "pct_ok": pct_ok,
    "iteration": iteration,
    "timestamp": ts
}
Path('stage_status.json').write_text(json.dumps(status, indent=2, ensure_ascii=False))
print("stage_status.json atualizado")
PYEOF

          git add PAUSA_AUTO.md stage_status.json
          git commit -m "watcher: PAUSA AUTOMÁTICA S5 — iter $ITER pct_ok=${PCT_OK}%

$MOTIVO

https://claude.ai/code/session_01VMgXMT3uZP2cLZPxUjvR8C"
          git remote set-url origin "https://x-access-token:${WORKFLOW_PAT}@github.com/freirelucas/teste.git"
          git push origin work-paused:claude/setup-docling-pipeline-g11gg

      - name: Checkout branch de trabalho
        if: steps.check.outputs.status == 'needs_fix' || steps.check.outputs.status == 'needs_human_review'
        uses: actions/checkout@v4
        with:
          ref: claude/setup-docling-pipeline-g11gg
          token: ${{ secrets.WORKFLOW_PAT }}
          fetch-depth: 1

      - name: Setup Python (para state machine)
        if: steps.check.outputs.status == 'needs_fix' || steps.check.outputs.status == 'needs_human_review'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Aplicar próximo fix da state machine (cobertura)
        if: steps.check.outputs.status == 'needs_fix' && steps.check.outputs.problem_type == 'cobertura'
        env:
          RUN_SUMMARY: ${{ steps.check.outputs.run_id }}
        run: |
          # Baixar diagnóstico do branch pipeline-outputs
          git fetch origin pipeline-outputs
          git checkout origin/pipeline-outputs -- ptd_run_summary.json 2>/dev/null || true
          git checkout origin/pipeline-outputs -- ocr_states.json 2>/dev/null || true

          python3 << 'PYEOF'
          import json, re
          from pathlib import Path

          # ── Carregar estado atual ────────────────────────────────────
          states_path = Path('ocr_states.json')
          if states_path.exists():
              states = json.loads(states_path.read_text())
          else:
              states = {}

          summary_path = Path('ptd_run_summary.json')
          if not summary_path.exists():
              print("ptd_run_summary.json não encontrado"); exit(0)
          summary = json.loads(summary_path.read_text())

          # Incluir orgs noise-only (rows > 0 mas pct_ok == 0) como ainda não resolvidas
          zero_orgs = summary.get('orgaos_zero_ou_noise',
                                  summary.get('orgaos_zero_entregas', []))
          por_orgao = {o['sigla']: o for o in summary.get('por_orgao', [])}

          if not zero_orgs:
              print("Nenhum órgão zerado ou noise-only — Stage 0 concluído."); exit(0)

          # ── State machine de parâmetros ──────────────────────────────
          # Para PDFs-imagem (OCR): variações de DPI e rotação
          OCR_STATES = [
              {'dpi': 200, 'rot': 0},
              {'dpi': 300, 'rot': 0},
              {'dpi': 200, 'rot': 90},
              {'dpi': 200, 'rot': 180},
              {'dpi': 200, 'rot': 270},
              {'dpi': 300, 'rot': 90},
              {'dpi': 300, 'rot': 270},
          ]
          # Para PDFs-texto (Docling): variações de threshold de linhas mínimas
          DOCLING_STATES = [
              {'table_min_rows': 2},
              {'table_min_rows': 1},
          ]
          MAX_OCR = len(OCR_STATES)
          MAX_DOCLING = len(DOCLING_STATES)

          # ── Avanço de estado para cada órgão zerado ──────────────────
          escalados = []
          for sig in zero_orgs:
              org = por_orgao.get(sig, {})
              extrator = org.get('extrator', '')
              is_ocr = extrator == 'pytesseract_ocr' or org.get('is_img', False)

              cur = states.get(sig, {'state': 0, 'type': 'ocr' if is_ocr else 'docling'})
              max_state = MAX_OCR if cur['type'] == 'ocr' else MAX_DOCLING

              if cur['state'] >= max_state:
                  escalados.append(sig)
                  states[sig] = {**cur, 'escalado': True}
                  print(f"  {sig}: ESCALADO — todos os {max_state} estados tentados sem progresso")
                  continue

              next_state = cur['state'] + 1
              states[sig] = {'state': next_state, 'type': cur['type']}
              print(f"  {sig}: state {cur['state']} → {next_state} ({cur['type']})")

          if escalados:
              Path('ocr_escalados.json').write_text(
                  json.dumps({'escalados': escalados}, indent=2, ensure_ascii=False))
              print(f"Órgãos escalados (sem progresso após todos estados): {escalados}")

          # ── Gerar ocr_config.json atualizado (apenas orgs não-escalados) ──
          ocr_config = {}
          docling_min_rows = 2
          for sig, st in states.items():
              if st.get('escalado'):
                  continue
              if st['type'] == 'ocr':
                  idx = min(st['state'], MAX_OCR - 1)
                  ocr_config[sig] = OCR_STATES[idx]
              else:
                  idx = min(st['state'], MAX_DOCLING - 1)
                  docling_min_rows = min(docling_min_rows, DOCLING_STATES[idx]['table_min_rows'])

          # Salvar states e ocr_config
          states_path.write_text(json.dumps(states, indent=2, ensure_ascii=False))
          Path('ocr_config_dynamic.json').write_text(
              json.dumps(ocr_config, indent=2, ensure_ascii=False))
          Path('docling_min_rows.txt').write_text(str(docling_min_rows))

          print(f"OCR config: {ocr_config}")
          print(f"Docling min_rows: {docling_min_rows}")
          PYEOF

      - name: Atualizar ptd_ocr_fallback.py e pipeline com config dinâmico
        if: steps.check.outputs.status == 'needs_fix' && steps.check.outputs.problem_type == 'cobertura'
        run: |
          if [ ! -f ocr_config_dynamic.json ]; then exit 0; fi

          python3 << 'PYEOF'
          import json, re
          from pathlib import Path

          ocr = json.loads(Path('ocr_config_dynamic.json').read_text())

          # Atualizar OCR_CONFIG em ptd_ocr_fallback.py
          fb = Path('ptd_ocr_fallback.py').read_text()
          new_cfg = 'OCR_CONFIG: dict[str, dict] = ' + json.dumps(
              {k: {'rot': v['rot'], 'dpi': v['dpi']} for k, v in ocr.items()},
              indent=4).replace('true','True').replace('false','False') + '\n'

          # Substituir bloco OCR_CONFIG (regex suporta dicts aninhados)
          fb = re.sub(
              r'OCR_CONFIG: dict\[str, dict\] = \{(?:[^{}]|\{[^{}]*\})*\}',
              new_cfg.rstrip(),
              fb, flags=re.DOTALL)
          Path('ptd_ocr_fallback.py').write_text(fb)
          print("ptd_ocr_fallback.py atualizado com config dinâmico")

          # Atualizar table_min_rows em ptd_pipeline_v30.py se necessário
          min_rows_file = Path('docling_min_rows.txt')
          if min_rows_file.exists():
              min_rows = int(min_rows_file.read_text().strip())
              pl = Path('ptd_pipeline_v30.py').read_text()
              pl = re.sub(
                  r'if len\(df\.columns\) < 2 or len\(df\) < \d+',
                  f'if len(df.columns) < 2 or len(df) < {min_rows}',
                  pl)
              Path('ptd_pipeline_v30.py').write_text(pl)
              print(f"ptd_pipeline_v30.py: table_min_rows → {min_rows}")
          PYEOF

      - name: Expandir vocabulário via top_unmatched_phrases
        if: steps.check.outputs.status == 'needs_fix' && steps.check.outputs.problem_type == 'vocabulario'
        run: |
          git fetch origin pipeline-outputs
          git checkout origin/pipeline-outputs -- ptd_run_summary.json 2>/dev/null || true

          python3 << 'PYEOF'
          import json
          from pathlib import Path

          summary_path = Path('ptd_run_summary.json')
          if not summary_path.exists():
              print("ptd_run_summary.json não encontrado"); exit(0)
          summary = json.loads(summary_path.read_text())

          # Combinar frases globais + por sigla (priorizando por-sigla para S4)
          unmatched_global = summary.get('top_unmatched_phrases', [])
          unmatched_por_sigla = summary.get('top_unmatched_por_sigla', {})

          # Agregar todas as frases: global + por sigla, somando counts
          all_phrases: dict = {}
          for entry in unmatched_global:
              if isinstance(entry, dict):
                  p, c = entry.get('phrase', entry.get('frase', '')), entry.get('count', 0)
              else:
                  p, c = str(entry), 1
              if p: all_phrases[p] = all_phrases.get(p, 0) + c

          # Carregar órgãos excluídos por política S5 (org_meta.json) — não usar suas frases
          import os
          _org_meta_raw = {}
          _org_meta_path = Path('/tmp/org_meta.json')
          if _org_meta_path.exists():
              try:
                  _org_meta_raw = json.loads(_org_meta_path.read_text())
              except Exception:
                  pass
          _excluidos_vocab = {k for k, v in _org_meta_raw.items()
                              if not k.startswith('_') and isinstance(v, dict)
                              and v.get('status') == 'excluir'}
          if _excluidos_vocab:
              print(f"[org_meta] Excluindo frases de {_excluidos_vocab} (status=excluir)")

          for sig, entries in unmatched_por_sigla.items():
              if str(sig) in _excluidos_vocab:
                  continue  # não alimentar vocab com frases de órgãos excluídos
              for entry in entries:
                  p = entry.get('phrase', entry.get('frase', ''))
                  c = entry.get('count', 1)
                  if p: all_phrases[p] = all_phrases.get(p, 0) + c

          if not all_phrases:
              print("Sem frases não-identificadas — vocabulário parece completo."); exit(0)

          produtos_path = Path('config/produtos_sgd_v23.json')
          config = json.loads(produtos_path.read_text())
          produtos = config.get('produtos', [])
          produtos_lower = {p.lower() for p in produtos}

          auto_added = []
          para_revisao = []
          _IGNORAR = ('eixo', 'diretriz', 'segurança', 'privacidade', 'serviço', 'produto',
                      'entrega', 'área', 'data', 'prazo')

          for frase, count in sorted(all_phrases.items(), key=lambda x: -x[1]):
              frase = frase.strip()
              if not frase or frase.lower() in produtos_lower:
                  continue
              if any(x in frase.lower() for x in _IGNORAR):
                  continue

              if count >= 8:
                  # Auto-adicionar (alta frequência agregada, baixo risco)
                  produtos.insert(0, frase)
                  produtos_lower.add(frase.lower())
                  auto_added.append({'frase': frase, 'count': count})
                  print(f"  AUTO: '{frase}' (count={count})")
              elif count >= 3:
                  # Reportar para revisão humana
                  para_revisao.append({'frase': frase, 'count': count})
                  print(f"  REVISÃO: '{frase}' (count={count})")

          if auto_added:
              config['produtos'] = produtos
              produtos_path.write_text(json.dumps(config, indent=2, ensure_ascii=False))
              print(f"{len(auto_added)} produtos auto-adicionados a config/produtos_sgd_v23.json")

          # Registrar pendências de revisão
          pending_path = Path('vocab_pending_review.json')
          existing = json.loads(pending_path.read_text()) if pending_path.exists() else []
          existing_phrases = {e['frase'] for e in existing}
          for item in para_revisao:
              if item['frase'] not in existing_phrases:
                  existing.append(item)
          if para_revisao:
              pending_path.write_text(json.dumps(existing, indent=2, ensure_ascii=False))
              print(f"{len(para_revisao)} frases registradas em vocab_pending_review.json")

          # ── Vollzug Protocol (ViableOS): gravar evidência da ação em /tmp ────
          from datetime import datetime
          _top_phrase = list(all_phrases.keys())[0] if all_phrases else None
          _filtradas = []
          for fp, fc in sorted(all_phrases.items(), key=lambda x: -x[1]):
              if fp.lower() in {p.lower() for p in produtos_lower if fp.lower() != fp.lower()} or \
                 any(x in fp.lower() for x in _IGNORAR):
                  _filtradas.append({'frase': fp, 'motivo': 'em _IGNORAR'})
          vollzug = {
              'problem_type':        'vocabulario',
              'quittung_ts':         datetime.utcnow().isoformat(timespec='seconds') + 'Z',
              'top_phrase':          _top_phrase,
              'n_frases_candidatas': len(all_phrases),
              'vollzug_acoes':       [f"adicionado '{a['frase']}' (count={a['count']})" for a in auto_added]
                                     or ['nenhuma adição (sem frases acima do threshold ou todas filtradas)'],
              'vollzug_filtradas':   _filtradas[:5],
              'vollzug_ts':          datetime.utcnow().isoformat(timespec='seconds') + 'Z',
              'bestätigung_pendente': True,
          }
          Path('/tmp/vollzug_current.json').write_text(
              json.dumps(vollzug, ensure_ascii=False, indent=2))
          print(f"[Vollzug] Quittung+Vollzug gravados: {len(auto_added)} adições, {len(_filtradas)} filtradas")
          PYEOF

      - name: Gravar stage_status.json e checkpoint humano
        if: steps.check.outputs.status == 'needs_human_review' || steps.check.outputs.status == 'done'
        run: |
          git fetch origin pipeline-outputs
          git checkout -B pipeline-outputs origin/pipeline-outputs 2>/dev/null || \
            (git checkout --orphan pipeline-outputs && git rm -rf . --quiet)

          python3 << 'PYEOF'
          import json
          from pathlib import Path

          summary = json.loads(Path('ptd_run_summary.json').read_text()) \
              if Path('ptd_run_summary.json').exists() else {}

          # Gerar lista de candidatos para revisão humana por estágio
          stage = summary.get('stage', 0)
          review_items = []
          if stage == 1:
              # Stage 1: listar orgs com maior taxa sem_produto
              for o in sorted(summary.get('por_orgao', []),
                              key=lambda x: x.get('sem_produto_n', 0), reverse=True)[:15]:
                  if o.get('sem_produto_n', 0) > 0:
                      review_items.append({
                          'sigla': o['sigla'],
                          'sem_produto_n': o['sem_produto_n'],
                          'sem_produto_pct': o.get('sem_produto_pct'),
                          'acao': 'adicionar produtos em config/produtos_sgd_v23.json'
                      })
          elif stage == 2:
              # Stage 2: listar orgs com menor col_map_ok_rate
              for o in sorted(summary.get('por_orgao', []),
                              key=lambda x: x.get('col_map_ok_rate') or 100)[:10]:
                  if (o.get('col_map_ok_rate') or 100) < 70:
                      review_items.append({
                          'sigla': o['sigla'],
                          'col_map_ok_rate': o.get('col_map_ok_rate'),
                          'acao': 'adicionar keywords em config/col_keys_extra.json'
                      })

          status = {
              'stage':       stage,
              'stage_label': summary.get('stage_label', ''),
              'pct_ok':      summary.get('pct_ok', 0),
              'n_zero':      len(summary.get('orgaos_zero_entregas', [])),
              'needs_human_review': stage in (1, 2),
              'review_items': review_items,
              'run_id':      summary.get('run_id', ''),
              'timestamp':   summary.get('timestamp', ''),
          }
          Path('stage_status.json').write_text(
              json.dumps(status, indent=2, ensure_ascii=False))
          print(f"stage_status.json: estágio {stage}, {len(review_items)} itens para revisão")
          PYEOF

          git config user.name  "ptd-watcher[bot]"
          git config user.email "ptd-watcher[bot]@users.noreply.github.com"
          git add stage_status.json
          git commit -m "watcher: stage_status atualizado — estágio ${{ steps.check.outputs.stage }} (${{ steps.check.outputs.stage_label }})" \
            --allow-empty
          git push origin pipeline-outputs

      - name: "[Step B] Col_keys_extra — auto-populate de unrecognized_headers"
        if: steps.check.outputs.status == 'needs_fix'
        run: |
          python3 << 'PYEOF'
          import json
          from pathlib import Path

          summary_path = Path('/tmp/ptd_run_summary_po.json')
          if not summary_path.exists():
              print("[Step B] summary não encontrado — pulando"); exit(0)
          summary = json.loads(summary_path.read_text())

          col_keys_path = Path('config/col_keys_extra.json')
          if col_keys_path.exists():
              col_keys = json.loads(col_keys_path.read_text(encoding='utf-8'))
          else:
              col_keys = {'_comentario': 'Gerado pelo watcher — não editar manualmente'}

          # Campo semântico inferido por keywords no nome do header
          _FIELD_HINTS = {
              'servico': ('serviço', 'servi', 'descri', 'ação', 'acao', 'atividade',
                          'iniciativa', 'objeto', 'tarefa', 'atividade', 'nome', 'título'),
              'produto': ('produto', 'entrega', 'item', 'resultado', 'output'),
              'area':    ('área', 'area', 'setor', 'unidade', 'órgão', 'responsável'),
              'data':    ('data', 'prazo', 'previsão', 'previsao', 'dt', 'vigência'),
          }

          def _infer_field(header_part: str) -> str | None:
              h = header_part.lower().strip()
              for field, hints in _FIELD_HINTS.items():
                  if any(hint in h for hint in hints):
                      return field
              return None

          updated = 0
          for org in summary.get('por_orgao', []):
              sigla = org.get('sigla', '')
              col_map_rate = org.get('col_map_ok_rate') or 0
              unrecog = org.get('unrecognized_headers', [])
              if not unrecog or col_map_rate >= 50:
                  continue  # só atua em orgs com col_map ruim

              sigla_cfg = col_keys.get(sigla, {field: [] for field in _FIELD_HINTS})
              for raw_header_str in unrecog:
                  parts = [p.strip() for p in raw_header_str.split('|') if p.strip()]
                  for part in parts:
                      field = _infer_field(part)
                      if field:
                          kw = part.lower().strip()[:30]
                          if kw not in sigla_cfg.get(field, []):
                              sigla_cfg.setdefault(field, []).append(kw)
                              updated += 1
                              print(f"  [{sigla}] {field}: +'{kw}'")

              col_keys[sigla] = sigla_cfg

          if updated > 0:
              col_keys_path.write_text(
                  json.dumps(col_keys, ensure_ascii=False, indent=2), encoding='utf-8')
              print(f"[Step B] {updated} keyword(s) adicionados a col_keys_extra.json")
          else:
              print("[Step B] Nenhum header novo a mapear.")
          PYEOF

      - name: "[Step D] Learning signals — registrar run + meta-learning"
        if: steps.check.outputs.status == 'needs_fix'
        env:
          ITERATION: ${{ steps.check.outputs.run_id }}
          PCT_OK: ${{ steps.check.outputs.pct_ok }}
          SEM_PROD: ${{ steps.check.outputs.sem_prod_pct }}
          PROBLEM_TYPE: ${{ steps.check.outputs.problem_type }}
        run: |
          python3 << 'PYEOF'
          import json, os
          from pathlib import Path
          from datetime import datetime

          signals_path = Path('ptd_learning_signals.json')
          tmp_signals  = Path('/tmp/ptd_learning_signals.json')
          summary_path = Path('/tmp/ptd_run_summary_po.json')

          # Carregar sinais existentes do pipeline-outputs
          signals = json.loads(tmp_signals.read_text()) if tmp_signals.exists() else {
              'schema_version': 1, 'run_history': [], 'meta_insights': [],
              'current_strategy': {'focus': 'vocabulario', 'auto_add_threshold': 8,
                                   'review_threshold': 3, 'priority_siglas': []},
          }

          summary = json.loads(summary_path.read_text()) if summary_path.exists() else {}

          # Último entry para delta
          history = signals.get('run_history', [])
          prev_pct = history[-1]['pct_ok'] if history else None
          curr_pct = float(os.environ.get('PCT_OK', 0) or 0)
          delta    = round(curr_pct - prev_pct, 2) if prev_pct is not None else None

          # Vocab count
          vocab_path = Path('config/produtos_sgd_v23.json')
          n_vocab = len(json.loads(vocab_path.read_text()).get('produtos', [])) if vocab_path.exists() else 0

          # Col_keys count
          ck_path = Path('config/col_keys_extra.json')
          ck_data = json.loads(ck_path.read_text()) if ck_path.exists() else {}
          n_col_keys = sum(len(v) for k, v in ck_data.items()
                          if not k.startswith('_') and isinstance(v, dict)
                          for kws in v.values() if isinstance(kws, list))

          # Per-sigla pct_ok snapshot
          per_sigla = {o['sigla']: o['pct_ok']
                       for o in summary.get('por_orgao', [])
                       if o.get('pct_ok') is not None}

          # Ler iteration do trigger_debug
          trigger = Path('.trigger_debug').read_text() if Path('.trigger_debug').exists() else ''
          iteration = 0
          for line in trigger.splitlines():
              if line.startswith('iteration:'):
                  try: iteration = int(line.split(':')[1].strip())
                  except: pass

          # ── Vollzug Protocol: ler evidência da ação + calcular Bestätigung ──
          vollzug_path = Path('/tmp/vollzug_current.json')
          vollzug_data = json.loads(vollzug_path.read_text()) if vollzug_path.exists() else None

          # Bestätigung: se último entry tinha vollzug pendente, calcular delta por sigla
          if history and history[-1].get('vollzug', {}).get('bestätigung_pendente'):
              prev_entry = history[-1]
              prev_per_sigla = prev_entry.get('per_sigla_ok', {})
              bestätigung_deltas = {
                  sig: round(curr_ok - prev_per_sigla[sig], 1)
                  for sig, curr_ok in per_sigla.items()
                  if sig in prev_per_sigla
              }
              prev_entry['vollzug']['bestätigung'] = bestätigung_deltas
              prev_entry['vollzug']['bestätigung_pendente'] = False
              prev_entry['vollzug']['bestätigung_ts'] = datetime.utcnow().isoformat(timespec='seconds') + 'Z'
              n_improved = sum(1 for d in bestätigung_deltas.values() if d > 0)
              print(f"[Vollzug] Bestätigung: {n_improved}/{len(bestätigung_deltas)} siglas melhoraram após ação anterior")

          entry = {
              'iteration':       iteration,
              'run_id':          summary.get('run_id', os.environ.get('ITERATION', '')),
              'ts':              datetime.utcnow().isoformat(timespec='seconds') + 'Z',
              'pct_ok':          curr_pct,
              'sem_produto_pct': float(os.environ.get('SEM_PROD', 0) or 0),
              'col_map_ok_rate': summary.get('col_map_ok_rate'),
              'n_vocab':         n_vocab,
              'n_col_keys':      n_col_keys,
              'action_type':     os.environ.get('PROBLEM_TYPE', 'desconhecido'),
              'delta_pct_ok':    delta,
              'per_sigla_ok':    per_sigla,
              'vollzug':         vollzug_data,   # None se nenhuma ação executada
          }
          signals['run_history'].append(entry)

          # Meta-learning a cada 10 iterações
          if iteration > 0 and iteration % 10 == 0:
              print(f"[Step D] Iteração {iteration} — disparando meta_learning.py")
              signals_path.write_text(json.dumps(signals, ensure_ascii=False, indent=2))
              import subprocess
              subprocess.run(['python3', 'meta_learning.py', '--window', '10'], check=False)
              # Re-ler sinais com meta-insights gravados pelo script
              if signals_path.exists():
                  signals = json.loads(signals_path.read_text())
          else:
              signals_path.write_text(json.dumps(signals, ensure_ascii=False, indent=2))

          # Salvar cópia em /tmp para o step "Marcar run como processado"
          import shutil
          shutil.copy(signals_path, '/tmp/ptd_learning_signals_updated.json')
          print(f"[Step D] iter={iteration} pct_ok={curr_pct}% delta={delta} n_vocab={n_vocab}")
          PYEOF

      - name: "[Step E] Sinal algedônico — escalação S5 se sem progresso"
        if: steps.check.outputs.status == 'needs_fix'
        run: |
          # Lê metaparâmetros do s3_meta_parameters.json (S2 → S3)
          MAX_ITERS=$(jq -r '.algedonico.max_iters_sem_progresso // 15' config/s3_meta_parameters.json 2>/dev/null || echo '15')
          MIN_PROG=$(jq -r '.algedonico.progresso_minimo_pp // 0.5' config/s3_meta_parameters.json 2>/dev/null || echo '0.5')
          JANELA=$(jq -r '.algedonico.janela_verificacao // 10' config/s3_meta_parameters.json 2>/dev/null || echo '10')

          # Contar iterações consecutivas sem progresso >= MIN_PROG (desde a cauda do histórico)
          ITERS_SEM=$(python3 - <<PYEOF
import json, sys
from pathlib import Path
p = Path('/tmp/ptd_learning_signals_updated.json')
if not p.exists():
    p = Path('/tmp/ptd_learning_signals.json')
signals = json.loads(p.read_text()) if p.exists() else {}
history = signals.get('run_history', [])
min_prog = float('$MIN_PROG')
iters_sem = 0
for entry in reversed(history):
    if (entry.get('delta') or 0) < min_prog:
        iters_sem += 1
    else:
        break
print(iters_sem)
PYEOF
          )

          echo "[Step E] Iterações sem progresso ≥ ${MIN_PROG}pp: ${ITERS_SEM} / ${MAX_ITERS}"

          if [ "${ITERS_SEM}" -ge "${MAX_ITERS}" ]; then
            echo "🚨 SINAL ALGEDÔNICO ATIVADO: ${ITERS_SEM} iterações sem melhoria ≥ ${MIN_PROG}pp"
            echo "Escalando para S5 (operador humano)..."
            python3 -c "
import json
from datetime import datetime
from pathlib import Path
signal = {
    'tipo': 'algedonico',
    'iters_sem_progresso': $ITERS_SEM,
    'threshold': $MAX_ITERS,
    'timestamp': datetime.utcnow().isoformat(),
    'acao_recomendada': 'revisao_humana — inspecionar top 5 siglas estagnadas e config/s3_meta_parameters.json'
}
Path('algedonico_signal.json').write_text(json.dumps(signal, indent=2, ensure_ascii=False))
print('algedonico_signal.json gerado')
"
          else
            echo "✅ Algedônico inativo (${ITERS_SEM}/${MAX_ITERS})"
          fi

      - name: Commit fixes e disparar próximo run
        if: steps.check.outputs.status == 'needs_fix'
        env:
          WORKFLOW_PAT: ${{ secrets.WORKFLOW_PAT }}
          PROBLEM_TYPE: ${{ steps.check.outputs.problem_type }}
          N_ZERO: ${{ steps.check.outputs.n_zero }}
        run: |
          git config user.name  "ptd-watcher[bot]"
          git config user.email "ptd-watcher[bot]@users.noreply.github.com"

          # Atualizar .trigger_debug atomicamente via Python
          ITER=$(grep 'iteration:' .trigger_debug | awk '{print $2}')
          NEXT_ITER=$((ITER + 1))
          python3 -c "
          from datetime import datetime
          from pathlib import Path
          Path('.trigger_debug').write_text(
              '# Atualizado pelo ptd-watcher[bot]\n'
              '# Não editar manualmente\n'
              f'last_trigger: {datetime.utcnow().strftime(\"%Y-%m-%dT%H:%M:%SZ\")}\n'
              f'iteration: $NEXT_ITER\n'
          )"

          # Adicionar arquivos conforme tipo de problema
          if [ "$PROBLEM_TYPE" = "cobertura" ]; then
            git add ptd_ocr_fallback.py ptd_pipeline_v30.py \
                    ocr_states.json ocr_config_dynamic.json .trigger_debug
            [ -f ocr_escalados.json ] && git add ocr_escalados.json || true
            COMMIT_DETAIL="OCR state machine: $N_ZERO órgãos zerados"
          elif [ "$PROBLEM_TYPE" = "vocabulario" ]; then
            git add config/produtos_sgd_v23.json .trigger_debug
            [ -f vocab_pending_review.json ] && git add vocab_pending_review.json || true
            COMMIT_DETAIL="vocabulário expandido via top_unmatched_phrases"
          else
            git add .trigger_debug
            COMMIT_DETAIL="qualidade — aguardando revisão humana"
          fi

          # Sempre adicionar aprendizado contínuo (Steps B, D, E)
          [ -f config/col_keys_extra.json ] && git add config/col_keys_extra.json || true
          [ -f algedonico_signal.json ] && git add algedonico_signal.json || true
          NEXT_META=$(grep 'iteration:' .trigger_debug | awk '{print $2+1}')
          if [ $(( NEXT_META % 10 )) -eq 0 ] && [ -f meta_learning.py ]; then
            git add meta_learning.py
          fi

          NEXT_ITER_VAL=$(grep 'iteration:' .trigger_debug | awk '{print $2}')
          git commit -m "watcher: iteration ${NEXT_ITER_VAL} — ${COMMIT_DETAIL}

          https://claude.ai/code/session_01VMgXMT3uZP2cLZPxUjvR8C"

          # Push com PAT → dispara push trigger do debug workflow
          git remote set-url origin "https://x-access-token:${WORKFLOW_PAT}@github.com/freirelucas/teste.git"
          git push origin claude/setup-docling-pipeline-g11gg

      - name: Marcar run como processado
        if: steps.check.outputs.status == 'needs_fix' || steps.check.outputs.status == 'done'
        run: |
          git config user.name  "ptd-watcher[bot]"
          git config user.email "ptd-watcher[bot]@users.noreply.github.com"
          git fetch origin pipeline-outputs
          git checkout pipeline-outputs
          echo "${{ steps.check.outputs.run_id }}" > .last_processed
          git add .last_processed
          # Persistir learning signals no pipeline-outputs (Step D output)
          if [ -f /tmp/ptd_learning_signals_updated.json ]; then
            cp /tmp/ptd_learning_signals_updated.json ptd_learning_signals.json
            git add ptd_learning_signals.json
          elif ls ../ptd_learning_signals.json 2>/dev/null; then
            cp ../ptd_learning_signals.json ptd_learning_signals.json
            git add ptd_learning_signals.json
          fi
          git commit -m "watcher: marcado run/${{ steps.check.outputs.run_id }} como processado + learning signals" \
            --allow-empty
          git push origin pipeline-outputs

      - name: Resumo
        if: always()
        run: |
          echo "## PTD Watcher — $(date -u +%Y-%m-%dT%H:%M)" >> $GITHUB_STEP_SUMMARY
          STATUS="${{ steps.check.outputs.status || 'waiting' }}"
          if [ "$STATUS" = "paused_auto" ]; then
            echo "| 🛑 Status | **PARADA AUTOMÁTICA** |" >> $GITHUB_STEP_SUMMARY
            echo "| Motivo | ${{ steps.check.outputs.parada_motivo }} |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Status | $STATUS |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "| Problema | ${{ steps.check.outputs.problem_type || '—' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Órgãos zerados | ${{ steps.check.outputs.n_zero || '—' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pct_ok | ${{ steps.check.outputs.pct_ok || '—' }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| sem_produto | ${{ steps.check.outputs.sem_prod_pct || '—' }}% |" >> $GITHUB_STEP_SUMMARY
          # Métricas de aprendizado contínuo
          N_HIST=$(jq '.run_history | length' /tmp/ptd_learning_signals.json 2>/dev/null || echo '—')
          STRATEGY=$(jq -r '.current_strategy.focus // "—"' /tmp/ptd_learning_signals.json 2>/dev/null || echo '—')
          N_META=$(jq '.meta_insights | length' /tmp/ptd_learning_signals.json 2>/dev/null || echo '—')
          echo "| Histórico L-C | ${N_HIST} entradas |" >> $GITHUB_STEP_SUMMARY
          echo "| Estratégia L-B | ${STRATEGY} |" >> $GITHUB_STEP_SUMMARY
          echo "| Meta-insights | ${N_META} |" >> $GITHUB_STEP_SUMMARY
          # Sinal algedônico
          if [ -f algedonico_signal.json ]; then
            ALGD_ITERS=$(jq -r '.iters_sem_progresso // "?"' algedonico_signal.json 2>/dev/null || echo '?')
            echo "| 🚨 Algedônico | ATIVO — ${ALGD_ITERS} iters sem progresso |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ✅ Algedônico | Inativo |" >> $GITHUB_STEP_SUMMARY
          fi
          # Doc coverage (se disponível no summary)
          DOC_COV=$(jq -r '.doc_coverage.cobertura_documental_pct // "—"' /tmp/ptd_run_summary_po.json 2>/dev/null || echo '—')
          echo "| Doc coverage | ${DOC_COV}% |" >> $GITHUB_STEP_SUMMARY
